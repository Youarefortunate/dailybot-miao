# 代码仓库配置
repos:
  gitlab:
    token: ""
    base_url: "http://git.b2bwings.com"
    target_user: ""
    repos:
      - path: "frontend_b2bwings/b2b-wings-composite"
        branch: "test"
        name: "村才后台管理系统"
      - path: "frontend_b2bwings/b2b-wings-easyloan-mini"
        branch: "master, liangan"
        name: "农融易小程序"
        # 爬取日期配置（不传则默认爬取当天）
        # 支持单个日期或日期区间，每个元素以逗号分隔起止日期
        crawl_dates:
          - "2026-01-4"
      - path: "frontend_b2bwings/b2b-wings-easyloan-admin"
        branch: "test"
        name: "农融易后台管理系统"

# 启用的工作流，名称要和 platforms 中的 key 对应
enabled_workflows: ["feishu"]

# 调度器配置 (Windows 本地定时触发配置)
scheduler:
  enabled: true
  auto_start: true # 开机自启
  # 兜底执行时间 (如果今日不符合任何 tasks 规则，或配置全过期)
  default_time: "18:20"
  tasks: # 指定特定时间运行
    - # 示例：二月工作日 18:20 运行
      time: "18:23"
      weekdays: [1, 2, 3, 4, 5]  # 双休
  #   - # 示例：特定日期特定时间
  #     dates: ["2026-02-27"]
  #     time: "20:00"
  #     weekdays: [1, 2, 3, 4, 5, 6, 7] # 单休

# 日志配置
log:
  level: "INFO"          # 控制台输出级别
  file_level: "DEBUG"    # 文件保存级别
  rotation: "00:00"      # 日志轮转时间 (每天零点)
  retention: "7 days"    # 日志保留时间
  path: "logs/dailybot_{time:YYYY-MM-DD}.log" # 日志路径模板

# Redis Token 存储配置
redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  database: 0
