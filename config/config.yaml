# 平台配置
platforms:
  # 飞书
  feishu:
    ai_model: "deepseek"
    app_id: ""
    app_secret: ""
    bot_token: ""
    target_chat_id: ""
    tasklist_guid: ""
    oauth_redirect_uri: "http://127.0.0.1:8001/feishu/callback"
    standup_time: "09:00"
    standup_timezone: "Asia/Shanghai"
    base_url: "https://open.feishu.cn"
  # 企业微信
  wecom:
    ai_model: "doubao"
    corp_id: ""
    corp_secret: ""

# AI 模型配置
models:
