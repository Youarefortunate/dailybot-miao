# 平台配置
platforms:
  # 飞书
  feishu:
    ai_model: "deepseek"
    app_id: ""
    app_secret: ""
    bot_token: ""
    target_chat_id: ""
    tasklist_guid: ""
    oauth_redirect_uri: "http://127.0.0.1:8001/feishu/callback"
    standup_time: "09:00"
    standup_timezone: "Asia/Shanghai"
    base_url: "https://open.feishu.cn"
  # 企业微信
  wecom:
    ai_model: "doubao"
    corp_id: ""
    corp_secret: ""
    # 自动化配置
    rpa:
      enabled: true
      speed: 1 # 自动化填写速度倍率: 0.1 (最快) - 1 (最慢 - 模拟真人)。非法值将默认为 1
      max_retry: 1 # 页面加载错误时的最大刷新重试次数 (0-N)
      auto_submit: false # 是否自动提交
      # 腾讯文档填报页面的 URL
      form_url: "https://doc.weixin.qq.com/journal/create?docid=c2_AEoAdAfTAA8AZIAWgZUAEUCNuRb0l5JOj_fork"
      # 浏览器类型: "chrome" 或 "msedge"
      browser_user_data_dir: "" # 为空时默认保存到当前项目根目录下的 .browser_profiles/指定浏览器类型 文件夹；如果有需求也可以填写绝对路径, 例如 "C:\\Users\\Default\\AppData\\Local\\Google\\Chrome\\User Data"
      browser_executable_path: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe" # 浏览器的绝对路径，如果你用 edge，通常是 "C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe"，留空则尝试使用 playwright 下载的内核

