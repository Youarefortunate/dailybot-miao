# 平台配置
platforms:
  # 飞书
  feishu:
    ai_model: "doubao"  # 该平台使用的总结模型
    app_id: ""
    app_secret: ""
    bot_token: ""
    target_chat_id: ""
    tasklist_guid: ""
    oauth_redirect_uri: "http://127.0.0.1:8001/feishu/callback"
    standup_time: "09:00"
    standup_timezone: "Asia/Shanghai"
    base_url: "https://open.feishu.cn"
  # 企业微信
  wecom:
    ai_model: "doubao"
    corp_id: ""
    corp_secret: ""

# AI 模型配置
models:
  # ==========================================
  # 动态 AI 模型配置示例 (由 AIFactory 自动识别并生产)
  # ==========================================
  # 场景 1：标准 OpenAI 兼容模型 (如 DeepSeek, Claude, GPT-4)
  # deepseek:
  #   name: "DeepSeek-V3"
  #   base_url: "https://api.deepseek.com/v1"
  #   api_key: "sk-your-key-here"
  #   model: "deepseek-chat"
  #   params:
  #     temperature: 0.7
  #     timeout: 5 # 5分钟超时

  # custom_legacy_ai:
  #   name: "自定义旧式 AI"
  #   base_url: "https://api.legacy-provider.com"
  #   api_key: "your-api-key"
  #   model: "davinci-002"
  #   apis:
  #     chat_completions: "POST /v1/completions"
  #   payload:
  #     model: "{model}"
  #     prompt: "系统指令：{system}\n待总结日报：{user}\n请按 JSON 格式返回总结结果。"
  #     max_tokens: 1024
  #     top_p: 1.0
  #   params:
  #     timeout: 2

  doubao:
    name: "豆包大模型"
    api_key: ""
    base_url: ""
    model: ""
    params:
      timeout: 3 # 设定3分钟超时
  glm:
    name: "智谱清言大模型"
    api_key: ""
    base_url: ""
    model: ""
    params:
      timeout: 10 # 智普的大模型思考和回答的时间可能会久一点

# 代码仓库配置
repos:
  gitlab:
    token: ""
    base_url: "http://git.b2bwings.com"
    target_user: ""
    repos:
      - path: "frontend_b2bwings/b2b-wings-composite"
        branch: "test"
        name: "村才后台管理系统"
      - path: "frontend_b2bwings/b2b-wings-easyloan-mini"
        branch: "master, liangan"
        name: "农融易小程序"
        # 爬取日期配置（不传则默认爬取当天）
        # 支持单个日期或日期区间，每个元素以逗号分隔起止日期
        crawl_dates:
          - "2026-01-4"
      - path: "frontend_b2bwings/b2b-wings-easyloan-admin"
        branch: "test"
        name: "农融易后台管理系统"

# 启用的工作流，名称要和 platforms 中的 key 对应
enabled_workflows: ["feishu"]

# 通用配置（无分类前缀）
log:
  level: "INFO"
