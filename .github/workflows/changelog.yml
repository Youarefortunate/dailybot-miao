name: Update Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BODY="${{ github.event.release.body }}"
          DATE=$(date +%Y-%m-%d)
          
          # 确保文件存在
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "项目的所有重要变更都将记录在此文件中。" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # 构造新的变更内容到临时文件
          echo "## [$VERSION] - $DATE" > new_entry.md
          echo "" >> new_entry.md
          echo "$BODY" >> new_entry.md
          echo "" >> new_entry.md
          
          # 拼接：头 4 行 + 新内容 + 剩余部分
          head -n 4 CHANGELOG.md > header.md
          tail -n +5 CHANGELOG.md > tail.md
          cat header.md new_entry.md tail.md > CHANGELOG.md
          
          # 清理
          rm new_entry.md header.md tail.md
          
          # 提交更改
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for $VERSION [skip ci]"
          git push
